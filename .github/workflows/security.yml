name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start TLPE application
        env:
          PORT: '4000'
          NODE_ENV: production
        run: |
          export TLPE_DATA_KEY="$(printf 'TLPE_ZAP_DEMO_KEY_32_BYTES_ONLY!' | base64 -w0)"
          npm start > /tmp/tlpe-zap.log 2>&1 &
          echo $! > /tmp/tlpe-zap.pid

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/api/health >/tmp/tlpe-health.json; then
              cat /tmp/tlpe-health.json
              exit 0
            fi
            sleep 2
          done
          echo "Application logs:" >&2
          cat /tmp/tlpe-zap.log >&2 || true
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1:4000'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: false
          artifact_name: 'zap-baseline'

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-reports
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: error

      - name: Evaluate ZAP thresholds
        if: always()
        env:
          ZAP_MODE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'push-main' || 'pull_request' }}
        run: node server/dist/scripts/evaluateZapReport.js report_json.json "$ZAP_MODE"

      - name: Stop TLPE application
        if: always()
        run: |
          if [ -f /tmp/tlpe-zap.pid ]; then
            kill $(cat /tmp/tlpe-zap.pid) || true
          fi
          cat /tmp/tlpe-zap.log || true
